name: Publish BOM

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Maven Action
        uses: s4u/setup-maven-action@v1.20.0
        with:
          java-version: 25
          java-distribution: temurin
          maven-version: 3.9.13
          settings-servers: |
            [
              {
                "id": "central",
                "username": "${{ secrets.SONATYPE_USERNAME }}",
                "password": "${{ secrets.SONATYPE_PASSWORD }}"
              }
            ]

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Check if version already published
        id: version_check
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L \
            "https://repo1.maven.org/maven2/io/github/temporal-rift/temporal-rift-bom/$VERSION/temporal-rift-bom-$VERSION.pom")
          echo "BOM HTTP Status: $STATUS"
          echo "VERSION_CHANGED=$( [ "$STATUS" = "200" ] && echo false || echo true )" >> $GITHUB_ENV

          BUILD_TOOLS_VERSION=$(mvn help:evaluate -f build-tools/pom.xml -Dexpression=project.version -q -DforceStdout)
          echo "BUILD_TOOLS_VERSION=$BUILD_TOOLS_VERSION" >> $GITHUB_ENV

          BT_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L \
            "https://repo1.maven.org/maven2/io/github/temporal-rift/temporal-rift-build-tools/$BUILD_TOOLS_VERSION/temporal-rift-build-tools-$BUILD_TOOLS_VERSION.pom")
          echo "build-tools HTTP Status: $BT_STATUS"
          echo "BUILD_TOOLS_CHANGED=$( [ "$BT_STATUS" = "200" ] && echo false || echo true )" >> $GITHUB_ENV

      - name: Publish build-tools to Maven Central
        if: env.BUILD_TOOLS_CHANGED == 'true'
        run: mvn --batch-mode -f build-tools/pom.xml deploy -Pcentral

      - name: Publish BOM to Maven Central
        if: env.VERSION_CHANGED == 'true'
        run: mvn --batch-mode deploy -Pcentral -Denforcer.skip=true

      - name: Create and push tag
        if: env.VERSION_CHANGED == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag v$VERSION
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/temporal-rift/temporal-rift-bom.git v$VERSION